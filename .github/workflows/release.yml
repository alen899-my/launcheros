name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules
        run: npx @electron/rebuild -f -w node-pty

      - name: Build Windows installer
        run: npx electron-builder --win --x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: windows-installer
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules
        run: npx @electron/rebuild -f -w node-pty

      - name: Build Linux packages
        run: npx electron-builder --linux --x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: linux-installer
          path: |
            dist/*.deb
            dist/*.AppImage

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-installer/*.exe
            artifacts/linux-installer/*.deb
            artifacts/linux-installer/*.AppImage
          generate_release_notes: true
